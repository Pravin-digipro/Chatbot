<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Digipro Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin:0; padding:0; }

body {
  font-family: 'Inter', sans-serif;
}

/* Floating Button */
#chat-toggle {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  font-size: 24px;
  color: white;
  background: linear-gradient(135deg,#6366f1,#06b6d4);
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  transition: 0.3s;
}
#chat-toggle:hover { transform: scale(1.08); }

/* Chat Window */
#chat-window {
  position: fixed;
  bottom: 100px;
  right: 24px;
  width: 380px;
  height: min(600px, 80vh);
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  overflow: hidden;
  opacity: 0;
  transform: translateY(20px);
  pointer-events: none;
  transition: 0.3s ease;
}
#chat-window.open {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* Header */
.chat-header {
  padding: 18px;
  background: linear-gradient(135deg,#6366f1,#06b6d4);
  color: white;
  display: flex;
  align-items: center;
  gap: 12px;
}
.chat-header img {
  width: 38px;
  height: 38px;
  border-radius: 50%;
}
.title { font-weight: 600; font-size: 15px; }
.status { font-size: 12px; opacity: 0.9; }

/* Messages */
#messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  background: #f8fafc;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* Message Wrapper */
.message-wrapper {
  display: flex;
  width: 100%;
  align-items: flex-end;
  gap: 8px;
}
.message-wrapper.user {
  justify-content: flex-end;
  padding-left: 40px;
}
.message-wrapper.bot {
  padding-right: 40px;
}

/* Avatar */
.avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
}

/* Bubble */
.message {
  max-width: 100%;
  padding: 12px 16px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.6;
  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
  white-space: pre-wrap;
  word-break: break-word;
}
.message-wrapper.bot .message {
  background: #e2e8f0;
  border-bottom-left-radius: 6px;
}
.message-wrapper.user .message {
  background: linear-gradient(135deg,#6366f1,#4f46e5);
  color: white;
  border-bottom-right-radius: 6px;
}

/* Timestamp */
.timestamp {
  font-size: 11px;
  margin-top: 6px;
  opacity: 0.6;
  text-align: right;
}

/* Input */
#input-area {
  display: flex;
  padding: 14px;
  background: #fff;
  border-top: 1px solid #e5e7eb;
}
#message-input {
  flex: 1;
  border: none;
  padding: 12px;
  border-radius: 12px;
  background: #f1f5f9;
  font-size: 14px;
  outline: none;
}
#send-btn {
  margin-left: 8px;
  border: none;
  padding: 0 18px;
  border-radius: 12px;
  background: linear-gradient(135deg,#6366f1,#06b6d4);
  color: white;
  cursor: pointer;
}

/* Typing dots */
.typing span {
  width: 6px;
  height: 6px;
  background: #94a3b8;
  border-radius: 50%;
  display: inline-block;
  animation: blink 1.4s infinite both;
}
.typing span:nth-child(2){ animation-delay: .2s; }
.typing span:nth-child(3){ animation-delay: .4s; }
@keyframes blink {
  0% { opacity: .2; }
  20% { opacity: 1; }
  100% { opacity: .2; }
}

/* Cursor animation */
.message.typing::after {
  content: "|";
  animation: blinkCursor 1s infinite;
  margin-left: 2px;
}
@keyframes blinkCursor {
  0%, 50%, 100% { opacity: 1; }
  25%, 75% { opacity: 0; }
}
</style>
</head>
<body>

<button id="chat-toggle">
  <img src="https://static.wixstatic.com/media/34385c_824d9838d8754e5992987ad9bcf17d76~mv2.jpg" alt="Chat">
</button>

<div id="chat-window">
  <div class="chat-header">
    <img src="https://static.wixstatic.com/media/34385c_824d9838d8754e5992987ad9bcf17d76~mv2.jpg">
    <div>
      <div class="title">Digipro Assistant</div>
      <div class="status">Online</div>
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input type="text" id="message-input" placeholder="Type your message..." />
    <button id="send-btn">Send</button>
  </div>
</div>

<script>
const toggleBtn = document.getElementById("chat-toggle");
const chatWindow = document.getElementById("chat-window");
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("message-input");
const sendBtn = document.getElementById("send-btn");

toggleBtn.onclick = () => chatWindow.classList.toggle("open");
sendBtn.onclick = sendMessage;
input.addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});

function getTime() {
  const now = new Date();
  return now.getHours() + ":" + String(now.getMinutes()).padStart(2, "0");
}

function addMessage(text, type) {
  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper " + type;

  const avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = type === "bot"
    ? "https://res.cloudinary.com/dbqjuze5g/image/upload/v1771938306/user_xojavv.png"
    : "https://static.wixstatic.com/media/34385c_824d9838d8754e5992987ad9bcf17d76~mv2.jpg";

  const bubbleContainer = document.createElement("div");
  const bubble = document.createElement("div");
  bubble.className = "message";
  bubble.innerText = text;

  const time = document.createElement("div");
  time.className = "timestamp";
  time.innerText = getTime();

  bubbleContainer.appendChild(bubble);
  bubbleContainer.appendChild(time);

  if (type === "bot") {
    wrapper.appendChild(avatar);
    wrapper.appendChild(bubbleContainer);
  } else {
    wrapper.appendChild(bubbleContainer);
    wrapper.appendChild(avatar);
  }

  messagesDiv.appendChild(wrapper);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function showTyping() {
  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper bot";
  wrapper.id = "typing";

  const avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = "https://res.cloudinary.com/dbqjuze5g/image/upload/v1771938306/user_xojavv.png";

  const bubble = document.createElement("div");
  bubble.className = "message";
  bubble.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;

  wrapper.appendChild(avatar);
  wrapper.appendChild(bubble);
  messagesDiv.appendChild(wrapper);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById("typing");
  if (typing) typing.remove();
}

function cleanText(text) {
  return text
    .replace(/([a-z])([A-Z])/g, "$1 $2")
    .replace(/,/g, ", ");
}

function streamReply(text) {
  const cleaned = cleanText(text);

  const wrapper = document.createElement("div");
  wrapper.className = "message-wrapper bot";

  const avatar = document.createElement("img");
  avatar.className = "avatar";
  avatar.src = "https://res.cloudinary.com/dbqjuze5g/image/upload/v1771938306/user_xojavv.png";

  const bubbleContainer = document.createElement("div");
  const bubble = document.createElement("div");
  bubble.className = "message typing";
  bubble.innerText = "";

  const time = document.createElement("div");
  time.className = "timestamp";
  time.innerText = getTime();

  bubbleContainer.appendChild(bubble);
  bubbleContainer.appendChild(time);
  wrapper.appendChild(avatar);
  wrapper.appendChild(bubbleContainer);
  messagesDiv.appendChild(wrapper);

  let index = 0;
  const typingSpeed = 20;

  const interval = setInterval(() => {
    if (index < cleaned.length) {
      bubble.innerText += cleaned.charAt(index);
      messagesDiv.scrollTop = messagesDiv.scrollHeight;
      index++;
    } else {
      bubble.classList.remove("typing");
      clearInterval(interval);
    }
  }, typingSpeed);
}

async function sendMessage() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";
  showTyping();

  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();
    removeTyping();
    streamReply(data.reply);

  } catch (err) {
    removeTyping();
    addMessage("Server error. Check backend.", "bot");
  }
}
</script>

</body>
</html>
